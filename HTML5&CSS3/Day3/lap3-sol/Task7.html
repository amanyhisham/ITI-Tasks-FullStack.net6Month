<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task7</title>
</head>
<style>
   input {
    padding: 3px;
    border: 2px solid black;
    border-radius: 4px;
   
  }
  label {
    display: block;  
  }
   input:invalid {
    border-color: red;
  }
  input:focus {
  border: 2px solid rgb(15, 14, 14);
  outline: none;
}
  input:valid + label {
    display: none;
  }
  input:valid{
        border-color: green;
  }

  
</style>
<body>
    <h2>Change Email Address</h2>
<form action="">
    <input required pattern="[A-Za-z]+" placeholder="UserName" type="text" title="Please enter letters only"> 
    <label>The required user name may only be a series of alphabetical characters.</label><br><br>
    <input required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" placeholder="Email" type="email"> 
    <label>The required email address may not include any special characters other than the '@' sign.</label><br><br>
    <button type="submit" style="padding: 8px 5px;">Change</button>
</body>
</form>
</html>

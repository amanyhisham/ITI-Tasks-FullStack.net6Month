<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <style>
.slider-container {
    width: 300px;      
    height: 230px;      
  }

#slider {
    width: 100%;         
    height: 100%;        
    object-fit: cover;   
  
}
</style>
</head>
<body>
<button onclick="prev()">Previous</button>
<button onclick="next()">Next</button>
<button onclick="autoPlay()">Play</button>
<button onclick="stopSlider()">Stop</button>
   <br>
   <br>
   <br>
<div class="slider-container">
    <img id="slider" src="img-slider/1.jpg">
</div>
</body>
   <script>
    let index=0;
    let img=["img-slider/1.jpg","img-slider/2.jpg","img-slider/3.jpg","img-slider/4.jpg","img-slider/5.jpg","img-slider/6.jpg"]
    let interval;
    function show(){
        document.getElementById("slider").src=img[index];
    }
    function prev(){
        if(index>0){
            index--;
            show();
        }
    }
     function next(){
        if(index<img.length-1){
            index++;
            show();
        }
    }
     function autoPlay(){
          interval=setInterval(function(){
         index=(index+1)%img.length;
         show();
         },1000)
    }
    function stopSlider(){
        clearInterval(interval);
    }
  </script>
</html>

<html>
<head>
  <title>Simple Form</title>
<style>
   body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
   }

  form {
    border: 1px solid #000;  
    padding: 20px;
  }

  div {
    margin-bottom: 15px;  
  }

  label, input {
     width: 100%;
  }

</style>

</head>

<body>
 <form id="myform">
    <div class="form">
        <label id="email">Email :</label>

    </div>
    <div>
         <label id="Password">Password :</label>
        <input type="password" for="Password" name="Password" id="passwordInput">
    </div>
  </form>
</body>
<script>

const custEvent=new Event('custEvent');

    if(email===""&&pass==="")
{
    form.dispatchEvent(custEvent);
}

form.addEventListener('custEvent',()=>{
    alert("user has not entered any data after 30s. ");

</html>

<head>

    <title>Day2-ES6</title>
    <style>
  #users {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;

  #users button {
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    background-color: #6c757d;

  #users button:hover {
    background-color: #495057; }
  #posts p {
    font-size: 16px;
    margin: 4px 0;
    padding: 6px 10px;
    background-color: #e9ecef; 
    border-radius: 4px;
  }

       <div id="posts"></div>
